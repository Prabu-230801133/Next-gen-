<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         p{ margin-left: 10cm;
            margin-top: 10cm;
            display: inline-block;
            border: 3px groove red;
            padding: 10px;
            animation: circle 5s linear infinite;
            position: relative;
        }

        @keyframes circle {
    0%   { transform: rotate(0deg) translate(150px) rotate(0deg);color: brown;border-color: aqua;border-width: .5cm; }
    100% { transform: rotate(360deg) translate(150px) rotate(-360deg);color: rgb(32, 66, 201); border-width: 2cm;}
}

    </style>
</head>

<body>
    <p>coolie da</p>
</body>

</html>
