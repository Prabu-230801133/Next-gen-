<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body bgcolor="skyblue">
    <h4 align="center">Volley Ball Camp Registration Form</h4>
    <center>
        <image src="/—Pngtree—volleyball player serving a ball_15281130.png" width="200px" height="200"></image>
        <form>
            <label style="color: rgb(225, 49, 84);">Name:</label>
            <input type="text" placeholder="Your name"><br><br>
            <label>Gender:</label>
            <input type="radio" name="gender" value="male">Male
            <input type="radio" name="gender" value="female">Female<br><br>
            <label>D.O.B:</label>
            <input type="date"><br><br>
            <label>E-Mail:</label>
            <input type="email" placeholder="your email"><br><br>
            <label>Phone:</label><input type="tel" placeholder="Enter your mobile number"><br><br>
                <label>Address:</label><br>
            <textarea placeholder="Enter your address"></textarea><br><br>

            <label>Your playing position:</label><br><br>
            <input type="radio" name="position">Left attacker
            <input type="radio" name="position">Right attcker
            <input type="radio" name="position">Defense<br>
            <input type="checkbox" name="position">Libro
            <input type="radio" name="position">All rounder
            <input type="radio" name="position">Setter<br><br>
            <label>Choose Duration:</label><br>

            <select name="duration">
                <option value="1">1 Month</option>
                <option value="2">2 Months</option>
                <option value="3">3 Months</option>
                <option value="6">6 Months</option>
                <option value="12">1 Year</option>
            </select><br><br>

            <label>Experience:</label>
            <input type="Number" placeholder="experience in numbers"><br><br>

            <label>Accomodation needed:</label><br><br>
            <input type="radio" name="acc">Yes
            <input type="radio" name="acc">No<br><br>


            <br><input type="submit" value="login">
            <button>Submit</button>
        </form>
</body>

</html>
